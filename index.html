<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>名前の数字診断ツール</title>
    <style>
        body { font-family: sans-serif; padding: 20px; line-height: 1.6; }
        .result-box { margin-top: 20px; padding: 15px; border: 1px solid #ddd; width: 300px; background-color: #f9f9f9; }
        input { padding: 8px; width: 250px; }
        button { padding: 8px 16px; cursor: pointer; }
    </style>
</head>
<body>
    <h2>名前の数字診断ツール</h2>
    <p>名前を入力すると、アルファベットを数字に変換して合計します。</p>
    <input type="text" id="nameInput" placeholder="例: Alice Smith">
    <button onclick="calculate()">計算する</button>

    <div class="result-box">
        <p id="vowelResult">母音の合計: --</p>
        <p id="consonantResult">子音の合計: --</p>
        <p id="totalResult">すべての合計: --</p>
    </div>

    <script>
        function calculate() {
            // 1. 入力値を取得して小文字に統一
            const input = document.getElementById('nameInput').value.toLowerCase();
            let vowelSum = 0;
            let consonantSum = 0;
            const vowels = ['a', 'i', 'u', 'e', 'o'];

            // 2. 文字を一つずつチェック
            for (let char of input) {
                // アルファベットのみを対象にする (スペースや記号は自動的に無視される)
                if (char >= 'a' && char <= 'z') {
                    
                    // 1〜9に変換するロジック
                    const code = char.charCodeAt(0) - 96; // a=1, b=2...
                    const val = ((code - 1) % 9) + 1;     // 9で循環させる

                    // 母音か子音か判定して加算
                    if (vowels.includes(char)) {
                        vowelSum += val;
                    } else {
                        consonantSum += val;
                    }
                }
            }

            // 3. 結果を表示
            document.getElementById('vowelResult').innerText = "母音の合計: " + vowelSum;
            document.getElementById('consonantResult').innerText = "子音の合計: " + consonantSum;
            document.getElementById('totalResult').innerText = "すべての合計: " + (vowelSum + consonantSum);
        }
    </script>
</body>
</html>
